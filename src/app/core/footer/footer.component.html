<button
  matIconButton
  (click)="scrollToTop()"
  class="fixed bottom-10 right-10 z-50 w-11 h-11 rounded-full 
         bg-primary/90 text-on-primary
         shadow-xl backdrop-blur-md
         flex items-center justify-center
         transform transition-all duration-500 ease-out
         translate-y-6 opacity-0
         hover:scale-110 hover:bg-primary"
  [ngClass]="{
    'translate-y-0 opacity-100': showScrollTop(),
    'pointer-events-auto cursor-pointer': showScrollTop(),
    'pointer-events-none': !showScrollTop()
  }"
>
  <mat-icon>keyboard_arrow_up</mat-icon>
</button>
