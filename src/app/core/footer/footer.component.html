<button
  matIconButton
  (click)="scrollToTop()"
  class="bg-on-primary fixed bottom-10 right-10 z-50 w-10 h-10 rounded-full shadow-lg flex items-center justify-center transform transition-all duration-500 ease-out translate-y-6 opacity-0 hover:scale-110"
  [ngClass]="{
    'translate-y-0 opacity-100': showScrollTop(),
    'pointer-events-auto cursor-pointer': showScrollTop(),
    'pointer-events-none': !showScrollTop(),
  }"
>
  <mat-icon class="text-primary"> keyboard_arrow_up </mat-icon>
</button>
