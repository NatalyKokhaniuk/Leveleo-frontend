<button mat-icon-button [matMenuTriggerFor]="menu" class="text-on-primary">
  <mat-icon>account_circle</mat-icon>
</button>

<mat-menu #menu="matMenu">
  <div class="px-4 py-3 border-b">
    <p class="font-medium">{{ currentUser()?.firstName }} {{ currentUser()?.lastName }}</p>
    <p class="text-sm text-on-surface-variant">{{ currentUser()?.email }}</p>
  </div>

  <button mat-menu-item (click)="open2FASetup()">
    <mat-icon>security</mat-icon>
    <span>{{ 'AUTH.2FA_SETUP' | translate }}</span>
  </button>

  <button mat-menu-item (click)="changePassword()">
    <mat-icon>lock</mat-icon>
    <span>{{ 'AUTH.CHANGE_PASSWORD' | translate }}</span>
  </button>

  <mat-divider></mat-divider>

  <button mat-menu-item (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>{{ 'HEADER.LOGOUT' | translate }}</span>
  </button>

  <button mat-menu-item color="warn" (click)="deleteAccount()">
    <mat-icon>delete_forever</mat-icon>
    <span>{{ 'AUTH.DELETE_ACCOUNT' | translate }}</span>
  </button>
</mat-menu>
