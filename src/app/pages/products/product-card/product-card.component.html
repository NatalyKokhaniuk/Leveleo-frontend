<article
  class="product-card flex flex-col bg-transparent rounded-2xl border border-outline-variant/25 overflow-hidden overflow-x-hidden max-w-full min-w-0 transition-shadow hover:shadow-md"
>
  <div class="relative min-w-0 max-w-full">
    <button
      type="button"
      class="block w-full max-w-full min-w-0 text-left cursor-pointer focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary rounded-2xl overflow-x-hidden"
      (click)="onCardClick()"
      (keydown)="onCardKeydown($event)"
      [attr.aria-label]="'PRODUCTS.OPEN_PRODUCT' | translate"
    >
      <div
        class="product-card__media relative aspect-[4/3] w-full bg-surface-container/35 flex items-center justify-center overflow-hidden"
      >
        @if (imageLoading()) {
          <span class="text-on-surface/50 text-sm">…</span>
        } @else if (imageUrl()) {
          <img
            [src]="imageUrl()!"
            [alt]="product.name"
            class="product-card__img w-full h-full object-cover"
            loading="lazy"
          />
        } @else {
          <mat-icon class="product-card__placeholder !w-16 !h-16 text-on-surface/30" aria-hidden="true"
            >image_not_supported</mat-icon
          >
        }

        @if (promotionLabel(); as promoName) {
          <span
            class="product-card__promo absolute top-2 right-2 z-[1] max-w-[min(72%,12rem)] truncate rounded-md bg-red-600 px-2 py-1 text-center text-xs font-medium text-white shadow-sm pointer-events-none"
            [title]="promoName"
          >
            {{ promoName }}
          </span>
        }
      </div>

      <div class="flex flex-col gap-2 p-4 min-w-0 max-w-full overflow-x-hidden">
        <h2
          class="text-base font-medium text-on-surface line-clamp-2 min-h-[2.75rem] break-words hyphens-auto"
        >
          {{ product.name }}
        </h2>

        <div
          class="flex flex-wrap items-center gap-0.5 min-w-0"
          [attr.aria-label]="product.averageRating + ' / 5'"
        >
          @for (s of [0, 1, 2, 3, 4]; track s) {
            <mat-icon
              class="!w-[1.125rem] !h-[1.125rem] text-[1.125rem] leading-none pointer-events-none"
              [class.text-amber-500]="starFilled(s)"
              [class.text-on-surface/25]="!starFilled(s)"
            >
              {{ starFilled(s) ? 'star' : 'star_border' }}
            </mat-icon>
          }
          @if (product.ratingCount > 0) {
            <span class="ml-1 text-xs text-on-surface/60">({{ product.ratingCount }})</span>
          }
        </div>

        <div class="flex flex-wrap items-baseline gap-2">
          <span class="text-lg font-semibold text-primary">
            {{ displayPrice() | number: '1.2-2' }}
            {{ 'PRODUCTS.CURRENCY' | translate }}
          </span>
          @if (hasDiscount()) {
            <span class="text-sm text-on-surface/50 line-through">
              {{ listPrice() | number: '1.2-2' }}
              {{ 'PRODUCTS.CURRENCY' | translate }}
            </span>
          }
        </div>
      </div>
    </button>

    <button
      type="button"
      class="product-card__fav absolute left-3 top-3 z-[2] inline-flex h-10 w-10 items-center justify-center rounded-full bg-surface/85 text-on-surface shadow backdrop-blur-sm border border-outline-variant/30 hover:bg-surface-container-high transition-colors"
      (click)="onFavoriteClick($event)"
      [attr.aria-pressed]="isFavorite"
      [attr.aria-label]="
        (isFavorite ? 'PRODUCTS.REMOVE_FAVORITES' : 'PRODUCTS.ADD_FAVORITES') | translate
      "
    >
      <mat-icon [class.text-red-500]="isFavorite" class="!text-[22px] w-[22px] h-[22px]">{{
        isFavorite ? 'favorite' : 'favorite_border'
      }}</mat-icon>
    </button>
  </div>
</article>
