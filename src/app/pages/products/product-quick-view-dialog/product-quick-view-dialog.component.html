<h2
  matDialogTitle
  class="!flex !items-start !justify-between !gap-3 !m-0 !pb-3 !pt-5 !min-h-0 min-w-0 max-w-full w-full overflow-x-hidden box-border shrink-0"
>
  <span
    class="min-w-0 flex-1 text-xl sm:text-2xl font-fixel font-semibold text-on-surface leading-snug break-words [overflow-wrap:anywhere] pr-2"
  >
    @if (data.product.slug) {
      <a
        href="#"
        class="hover:underline focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 rounded"
        (click)="$event.preventDefault(); openProductPage()"
      >
        {{ displayName() }}
      </a>
    } @else {
      {{ displayName() }}
    }
  </span>
  <div class="shrink-0 -mt-1 -mr-1 inline-flex items-center gap-1">
    <button
      matIconButton
      type="button"
      (click)="openProductPage()"
      [disabled]="!data.product.slug"
      [attr.aria-label]="'PRODUCTS.OPEN_PRODUCT' | translate"
    >
      <mat-icon>open_in_new</mat-icon>
    </button>
    <button
      matIconButton
      type="button"
      (click)="close()"
      [attr.aria-label]="'PRODUCTS.MODAL_CLOSE' | translate"
    >
      <mat-icon>close</mat-icon>
    </button>
  </div>
</h2>

<mat-dialog-content
  class="product-quick-view__content !m-0 !pt-0 !pb-2 max-w-full min-w-0 !overflow-y-auto !overflow-x-hidden flex flex-col flex-1 min-h-0"
>
  <app-product-detail-tabs
    [product]="data.product"
    [compact]="true"
    [dialogLayout]="true"
    [hideTitleInDetailsTab]="true"
  />
</mat-dialog-content>

<mat-dialog-actions
  align="start"
  class="!flex !flex-wrap !w-full !justify-start !gap-2 !py-3 !px-0 !m-0 border-t border-outline-variant/40 shrink-0"
>
  <app-product-commerce-toolbar class="w-full min-w-0" [productId]="data.product.id" />
</mat-dialog-actions>
