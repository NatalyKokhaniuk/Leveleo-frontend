<main class="pt-32 px-4 md:px-10 max-w-6xl mx-auto flex flex-col gap-6 min-w-0">
  <div class="flex flex-col gap-2">
    <a
      routerLink="/admin"
      class="inline-flex items-center gap-1 text-primary text-sm font-medium hover:underline w-fit"
    >
      <mat-icon class="text-lg w-5 h-5">arrow_back</mat-icon>
      {{ 'ADMIN.BACK' | translate }}
    </a>
    <h1 class="modal-title text-2xl md:text-3xl text-left">
      {{ 'ADMIN.USER.TITLE' | translate }}
    </h1>

    <p class="modal-desc text-left max-w-none">
      {{ 'ADMIN.USER.DESCRIPTION' | translate }}
    </p>
  </div>

  <!-- TABLE -->
  <section class="p-4 sm:p-6 rounded-2xl border border-outline-variant bg-surface-container flex flex-col gap-6 min-w-0">
    <app-data-table
      [data]="users"
      [columns]="columns"
      [rowLoading]="rowLoading"
      (action)="handleAction($event)"
    />
  </section>
</main>
