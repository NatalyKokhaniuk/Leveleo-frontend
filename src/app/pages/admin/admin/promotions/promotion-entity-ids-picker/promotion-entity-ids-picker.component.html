<div class="flex flex-col gap-2.5 w-full">
  <mat-form-field class="w-full">
    <mat-label>{{ kind === 'product' ? 'Пошук товару' : 'Пошук категорії' }}</mat-label>
    <input
      matInput
      [disabled]="disabled"
      [value]="search"
      (input)="onSearchInput(($any($event.target).value || '').toString())"
      [placeholder]="kind === 'product' ? 'Введіть назву товару' : 'Введіть назву категорії'"
    />
  </mat-form-field>

  @if (loading()) {
    <span class="text-xs opacity-70">Завантаження...</span>
  } @else if (suggestions().length > 0) {
    <div class="flex flex-col gap-1 rounded-lg border border-outline-variant/40 bg-surface-container/50 p-2 max-h-40 overflow-auto">
      @for (s of suggestions(); track s.id) {
        <button matButton type="button" class="justify-start rounded-md" (click)="add(s.id)">
          <mat-icon>add</mat-icon>
          <span class="truncate">{{ s.name }}</span>
        </button>
      }
    </div>
  }

  @if (selectedItems().length > 0) {
    <div class="flex flex-wrap gap-2">
      @for (item of selectedItems(); track item.id) {
        <span class="inline-flex items-center gap-1 rounded-full border border-outline-variant/50 bg-surface-container px-2 py-1 text-xs">
          <span class="max-w-[18rem] truncate" [title]="item.name">{{ item.name }}</span>
          <button mat-icon-button type="button" (click)="remove(item.id)"><mat-icon>close</mat-icon></button>
        </span>
      }
    </div>
  }
</div>
