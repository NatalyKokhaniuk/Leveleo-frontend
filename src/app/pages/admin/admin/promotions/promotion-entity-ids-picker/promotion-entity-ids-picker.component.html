<div class="flex flex-col gap-2 w-full">
  <input
    matInput
    [disabled]="disabled"
    [value]="search"
    (input)="onSearchInput(($any($event.target).value || '').toString())"
    [placeholder]="kind === 'product' ? 'Search product...' : 'Search category...'"
    class="w-full rounded border border-outline-variant px-3 py-2"
  />

  @if (loading()) {
    <span class="text-xs opacity-70">Loading…</span>
  } @else if (suggestions().length > 0) {
    <div class="flex flex-col gap-1 rounded border border-outline-variant p-2 max-h-40 overflow-auto">
      @for (s of suggestions(); track s.id) {
        <button matButton type="button" class="justify-start" (click)="add(s.id)">
          <mat-icon>add</mat-icon>
          <span class="truncate">{{ s.name }}</span>
        </button>
      }
    </div>
  }

  @if (ids.length > 0) {
    <div class="flex flex-wrap gap-2">
      @for (id of ids; track id) {
        <span class="inline-flex items-center gap-1 rounded-full border border-outline-variant px-2 py-1 text-xs">
          <span>{{ id }}</span>
          <button mat-icon-button type="button" (click)="remove(id)"><mat-icon>close</mat-icon></button>
        </span>
      }
    </div>
  }

  <textarea
    matInput
    rows="2"
    [disabled]="disabled"
    [value]="value"
    (input)="onRawInput(($any($event.target).value || '').toString())"
    placeholder="GUIDs comma/space separated"
    class="w-full rounded border border-outline-variant px-3 py-2"
  ></textarea>
</div>
