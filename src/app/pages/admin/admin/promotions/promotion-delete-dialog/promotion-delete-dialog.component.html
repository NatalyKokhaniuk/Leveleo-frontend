<div class="promotion-delete-dialog p-6 md:p-8 overflow-hidden">
  <div class="mx-auto h-14 w-14 rounded-full bg-error-container text-on-error-container flex items-center justify-center mb-4">
    <mat-icon class="!w-8 !h-8 !text-3xl">delete</mat-icon>
  </div>
  <h2 class="text-center text-xl md:text-2xl font-semibold mb-3">{{ 'ADMIN.PROMOTION.DELETE_TITLE' | translate }}</h2>
  <p class="text-center text-on-surface/85 leading-relaxed mb-6">
    {{ 'ADMIN.PROMOTION.DELETE_DESC' | translate: { name: data.name } }}
  </p>
  <div class="flex flex-wrap items-center justify-center gap-3 pt-1">
    <button matButton type="button" (click)="cancel()" [disabled]="deleting()">
      {{ 'AUTH.CANCEL' | translate }}
    </button>
    <button matButton="filled" color="warn" type="button" (click)="confirm()" [disabled]="deleting()">
      {{ 'ADMIN.TABLE.DELETE' | translate }}
    </button>
  </div>
</div>
