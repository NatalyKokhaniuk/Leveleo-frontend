<h2 mat-dialog-title>{{ 'ADMIN.PRODUCT.DELETE_TITLE' | translate }}</h2>
<mat-dialog-content>
  <p class="modal-desc max-w-none">
    {{ 'ADMIN.PRODUCT.DELETE_DESC' | translate: { name: data.name } }}
  </p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="ref.close(false)">
    {{ 'AUTH.CANCEL' | translate }}
  </button>
  <button mat-flat-button color="warn" type="button" (click)="ref.close(true)">
    {{ 'ADMIN.TABLE.DELETE' | translate }}
  </button>
</mat-dialog-actions>
