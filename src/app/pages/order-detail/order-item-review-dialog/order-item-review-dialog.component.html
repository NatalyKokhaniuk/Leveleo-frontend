<h2
  matDialogTitle
  class="!flex !items-start !justify-between !gap-3 !m-0 !pb-3 !pt-5 !min-h-0 min-w-0 max-w-full w-full overflow-x-hidden box-border shrink-0"
>
  <span
    class="min-w-0 flex-1 text-xl sm:text-2xl font-fixel font-semibold text-on-surface leading-snug break-words [overflow-wrap:anywhere] pr-2"
  >
    {{ 'ORDER_VIEW.REVIEW_MODAL_TITLE' | translate }}
  </span>
  <button
    matIconButton
    type="button"
    class="shrink-0 -mt-1 -mr-1"
    (click)="close()"
    [attr.aria-label]="'PRODUCTS.MODAL_CLOSE' | translate"
  >
    <mat-icon>close</mat-icon>
  </button>
</h2>

<mat-dialog-content
  class="order-item-review-dialog__content !m-0 !pt-0 !pb-2 max-w-full min-w-0 !overflow-y-auto !overflow-x-hidden flex flex-col flex-1 min-h-0"
>
  @if (loading()) {
    <div class="flex justify-center py-12">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  } @else if (loadError()) {
    <p class="text-sm text-on-surface/80 py-6">{{ 'ORDER_VIEW.REVIEW_MODAL_LOAD_ERROR' | translate }}</p>
  } @else if (product(); as p) {
    @if (p.slug.trim(); as slug) {
      <a
        [routerLink]="['/products', slug]"
        class="text-sm font-medium text-primary hover:underline mb-3 inline-block break-words [overflow-wrap:anywhere] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 rounded"
        target="_blank"
        rel="noopener noreferrer"
        >{{ displayName() }}</a>
    } @else {
      <p class="text-sm font-medium text-on-surface mb-3 break-words [overflow-wrap:anywhere]">{{ displayName() }}</p>
    }
    <app-product-detail-tabs
      [product]="p"
      [compact]="true"
      [dialogLayout]="true"
      [hideTitleInDetailsTab]="true"
      [orderItemId]="data.orderItemId"
      [openOnReviewsTab]="true"
    />
  }
</mat-dialog-content>
