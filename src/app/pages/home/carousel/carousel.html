<div
  class="relative w-full overflow-hidden"
  (mouseenter)="pause()"
  (mouseleave)="resume()"
>

  <!-- TRACK -->
  <div
    class="flex transition-transform duration-500 ease-in-out"
    [style.transform]="'translateX(-' + currentIndex() * 100 + '%)'"
  >

    @for (brand of brands; track $index) {
      <a
        [routerLink]="brand.link"
        class="min-w-full h-[280px] md:h-[360px] rounded-2xl flex items-center justify-center text-white font-bold text-xl transition hover:scale-105"
        [ngClass]="brand.color"
      >
        {{ brand.name }}
      </a>
    }

  </div>

  <!-- LEFT -->
  <button
    (click)="prev()"
    class="absolute left-3 top-1/2 -translate-y-1/2 bg-black/40 text-white p-2 rounded-full"
  >
    <mat-icon>chevron_left</mat-icon>
  </button>

  <!-- RIGHT -->
  <button
    (click)="next()"
    class="absolute right-3 top-1/2 -translate-y-1/2 bg-black/40 text-white p-2 rounded-full"
  >
    <mat-icon>chevron_right</mat-icon>
  </button>

  <!-- DOTS -->
  <div class="flex justify-center gap-2 mt-4">
    @for (brand of brands; track $index; let i = $index) {
      <button
        (click)="goTo(i)"
        class="w-2 h-2 rounded-full transition-all"
        [ngClass]="{
          'bg-primary scale-125': currentIndex() === i,
          'bg-gray-400': currentIndex() !== i
        }"
      ></button>
    }
  </div>

</div>
