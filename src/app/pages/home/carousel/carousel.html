<div class="relative w-full">
  <div
    class="relative w-full overflow-hidden rounded-2xl"
    (mouseenter)="pause()"
    (mouseleave)="resume()"
  >

    <!-- TRACK -->
    <div
      class="flex transition-transform duration-500 ease-in-out"
      [style.transform]="'translateX(-' + currentIndex() * 100 + '%)'"
    >

      @for (brand of brands; track $index) {
        <a
          [routerLink]="brand.link"
          class="min-w-full h-[320px] sm:h-[380px] md:h-[440px] rounded-2xl flex items-center justify-center text-white font-bold text-2xl sm:text-3xl transition hover:scale-105"
          [ngClass]="brand.color"
        >
          {{ brand.name }}
        </a>
      }

    </div>

    <!-- LEFT -->
    <button
      type="button"
      (click)="prev()"
      class="carousel-nav-btn absolute left-3 top-1/2 -translate-y-1/2 bg-black/40 text-white border-0 cursor-pointer shadow-md hover:bg-black/55 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white/80"
      [attr.aria-label]="'CAROUSEL.PREV_SLIDE' | translate"
    >
      <mat-icon>chevron_left</mat-icon>
    </button>

    <!-- RIGHT -->
    <button
      type="button"
      (click)="next()"
      class="carousel-nav-btn absolute right-3 top-1/2 -translate-y-1/2 bg-black/40 text-white border-0 cursor-pointer shadow-md hover:bg-black/55 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white/80"
      [attr.aria-label]="'CAROUSEL.NEXT_SLIDE' | translate"
    >
      <mat-icon>chevron_right</mat-icon>
    </button>

  </div>

  <!-- DOTS (поза overflow-hidden, щоб не перекривались наступним блоком) -->
  <div class="flex justify-center gap-2 mt-5 md:mt-6 pb-3 md:pb-5">
    @for (brand of brands; track $index; let i = $index) {
      <button
        type="button"
        (click)="goTo(i)"
        class="w-2 h-2 rounded-full transition-all"
        [ngClass]="{
          'bg-primary scale-125': currentIndex() === i,
          'bg-gray-400': currentIndex() !== i
        }"
      ></button>
    }
  </div>
</div>
