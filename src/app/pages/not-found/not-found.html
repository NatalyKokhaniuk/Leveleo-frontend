<main class="pt-32 pb-16 px-4 md:px-10 max-w-6xl mx-auto flex flex-col gap-12">

<div class="notfound w-full h-full">
  <h1>404</h1>

  <p>
    {{ 'NOT_FOUND.TITLE' | translate }}
  </p>

  <a routerLink="/">
    {{ 'NOT_FOUND.BACK' | translate }}
  </a>
</div>

<div class="hero fade-in">
  
      <h1 class="mat-display-large font-fixel font-bold text-3xl">
        {{ 'HOME.WELCOME' | translate }}
      </h1>
      <p class="mat-body-large">{{ 'HOME.DESCRIPTION' | translate }}</p>
    </div>
  
 <!-- Кнопки — показують primary колір -->
 <div class="flex gap-4 mb-5">
  <button matIconButton>
    <mat-icon>favorite</mat-icon>
  </button>
  <button matButton="text">Text</button>
  <button matButton="filled">Filled</button>
  <button matButton="filled" class="mat-secondary-button">Filled2</button>
  <button matButton="filled" class="mat-tertiary-button">Filled3</button>
  <button matButton="elevated">Elevated</button>
  <button matButton="outlined">Outlined</button>
  <button matButton="tonal">Tonal</button>
  <button matButton="tonal" class="mat-primary-button">Tonal1</button>
  <button matButton="tonal" class="mat-tertiary-button">Tonal3</button>
</div>

<!-- Картка — показує surface колір -->
<mat-card class="mb-8 mat-tertiary-card h-125" style="max-width: 400px">
  <mat-card-header>
    <mat-card-title>Card title</mat-card-title>
    <mat-card-subtitle class="text-tertiary-card">Card subtitle</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <p>Це виглядає в твоїй темі</p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-button>Action</button>
  </mat-card-actions>
</mat-card>

<!-- Chip — показує secondary -->
<div class="flex gap-2">
  <mat-chip>Chip one</mat-chip>
  <mat-chip>Chip two</mat-chip>
</div>

<!-- Таби — показують secondary колір -->
<mat-tab-group>
  <mat-tab label="Tab one">Tab one content</mat-tab>
  <mat-tab label="Tab two">Tab two content</mat-tab>
</mat-tab-group>

<div class="mt-2 w-full flex flex-col gap-2 bg-surface-container">
  asdfasfsdfsdfdsf
  <div class="bg-surface text-on-surface">
    <h1 class="text-primary font-fixel">Заголовок</h1>
    <button matButton="filled" class="bg-tertiary text-on-tertiary">Кнопка</button>
  </div>
</div>

</main>
