<h2 mat-dialog-title>{{ 'ADDRESS.DELETE_TITLE' | translate }}</h2>
<mat-dialog-content>
  <p class="text-sm opacity-90">{{ 'ADDRESS.DELETE_CONFIRM' | translate }}</p>
  <p class="text-sm font-medium mt-2 break-words">{{ data.label }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="ref.close(false)">
    {{ 'ADDRESS.CANCEL' | translate }}
  </button>
  <button mat-flat-button color="warn" type="button" (click)="ref.close(true)">
    {{ 'ADDRESS.DELETE' | translate }}
  </button>
</mat-dialog-actions>
